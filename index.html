<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>勤務報告ポチるだけ</title>
    <link rel="stylesheet" href="style.css">
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="script.js" defer></script>
</head>
<body>
    <!-- ローディング表示（通信中に表示） -->
    <div id="loader" class="loading-overlay">通信中...</div>

    <!-- 1. ログイン画面 -->
    <div id="loginArea">
        <h2>勤務報告ポチるだけ</h2>
        <div class="form-item">
            <input type="text" id="userNameInput" placeholder="ユーザー名を入力">
        </div>
        <div class="form-item">
            <input type="password" id="passwordInput" placeholder="パスワードを入力">
        </div>
        <button onclick="login()" class="btn-primary">ログイン</button>
    </div>

    <!-- 2. メインアプリ画面 -->
    <div class="container" id="mainApp" style="display: none;">
        
        <!-- ユーザーバッジ（右上配置） -->
        <div class="user-badge" onclick="logout()" title="ログアウト">
            <span id="displayUserName">ユーザー</span>
            <svg viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
        </div>

        <h2>勤務報告ポチるだけ</h2>
        <div id="msg"></div>
        
        <!-- クイック入力ボタン -->
        <div class="btn-group">
            <button class="btn-start" onclick="quickLog('start', '出社')">出社で開始</button>
            <button class="btn-start" onclick="quickLog('start', '在宅')">在宅で開始</button>
            <button class="btn-end" onclick="quickLog('end')" style="grid-column: span 2;">作業を終了する</button>
        </div>

        <!-- 月切り替え -->
        <div class="month-selector">
            <button class="nav-btn" onclick="changeMonth(-1)">◀ 前月</button>
            <div id="monthDisplay"></div>
            <button class="nav-btn" onclick="changeMonth(1)">次月 ▶</button>
        </div>

        <!-- カレンダー本体 -->
        <div class="calendar" id="calendar"></div>

        <!-- フッター操作 -->
        <div class="footer">
            <button class="copy-btn" onclick="copyForExcel()">1ヶ月分を書き出す</button>
        </div>
    </div>

    <!-- 3. 編集モーダル（日付クリック時に表示） -->
    <div class="modal" id="editModal" style="display: none;">
        <div class="modal-content">
            <h4 id="editDateLabel"></h4>
            
            <div class="form-item row">
                <input type="checkbox" id="editIsAbsent" onchange="toggleAbsent()"> 
                <label for="editIsAbsent">欠勤 / 休暇</label>
            </div>

            <div class="form-item">
                <label class="lbl">勤務場所 または 理由</label>
                <input type="text" id="editPlace" list="places" placeholder="出社、在宅など">
                <datalist id="places">
                    <option value="出社">
                    <option value="在宅">
                    <option value="新横浜">
                    <option value="有給">
                    <option value="特休">
                    <option value="病欠">
                </datalist>
            </div>

            <div id="timeInputs">
                <div class="form-item">
                    <label class="lbl">開始時間</label>
                    <input type="time" id="editStart">
                </div>
                <div class="form-item">
                    <label class="lbl">終了時間</label>
                    <input type="time" id="editEnd">
                </div>
            </div>

            <button onclick="saveEdit()" class="btn-primary" style="padding:14px; border-radius:12px; margin-top:10px;">保存する</button>
            <button onclick="deleteEntry()" class="btn-delete">この日のデータを削除</button>
            <button onclick="closeModal()" class="btn-close">閉じる</button>
        </div>
    </div>

    <!-- スクリプトの読み込み -->
    <script src="script.js"></script>
</body>
</html>
